# Fly.io deployment config for Article 4 — ChatGPT 主催の LLM 合議
# 初回: `fly apps create article-4-llm-council --org personal`
# 以降: `fly deploy`
#
# Secrets (= env vars with redaction) は必ず CLI でセット:
#   fly secrets set \
#     ANTHROPIC_API_KEY=sk-ant-... \
#     GOOGLE_API_KEY=<your-google-api-key> \
#     OAUTH_OWNER_PASSWORD=$(openssl rand -hex 16) \
#     OAUTH_ISSUER=https://article-4-llm-council.fly.dev \
#     ALLOWED_HOSTS=article-4-llm-council.fly.dev

app = "article-4-llm-council"
primary_region = "nrt"  # Narita — 著者が東京近郊なので

[build]

[env]
  PORT = "3001"
  MCP_HOST = "0.0.0.0"
  DEMO_MODE = "true"
  DEMO_DAILY_CAP = "200"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"       # アイドル時にマシン停止 (無料枠節約)
  auto_start_machines = true        # 次のリクエストで自動起動
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256                   # 無料枠 (shared-cpu-1x, 256MB) に収める
